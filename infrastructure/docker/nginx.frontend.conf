server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # 前端 history 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA entry
    location /index.html {
        expires -1;
    }
}
