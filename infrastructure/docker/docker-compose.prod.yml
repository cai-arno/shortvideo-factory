# 短视频工厂 - 生产环境部署配置

version: "3.8"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: shortvideo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-shortvideo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: shortvideo-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 API
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-shortvideo/factory}/backend:latest
    container_name: shortvideo-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-shortvideo}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      # AI API
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      # JWT
      SECRET_KEY: ${SECRET_KEY:-changeme-in-production}
      # FFmpeg
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
      # OSS
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_ACCESS_KEY: ${OSS_ACCESS_KEY:-}
      OSS_ACCESS_SECRET: ${OSS_ACCESS_SECRET:-}
      OSS_BUCKET: ${OSS_BUCKET:-shortvideo-assets}
      # 抖音
      DOUYIN_CLIENT_ID: ${DOUYIN_CLIENT_ID:-}
      DOUYIN_CLIENT_SECRET: ${DOUYIN_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端 (Nginx 静态托管)
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-shortvideo/factory}/frontend:latest
    container_name: shortvideo-frontend
    restart: always

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: shortvideo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  postgres_data:
  redis_data:
